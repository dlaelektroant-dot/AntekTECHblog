<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AntekTECH blog</title>
<style>
    body {
        margin: 0;
        background: #000;
        color: #e0e0e0;
        font-family: "Courier New", monospace;
    }

    /* HEADER */
    header {
        padding: 40px;
        text-align: center;
        background: #000;
        border-bottom: 2px solid #222;
    }
    header h1 {
        margin: 0;
        font-size: 50px;
        color: #fff;
        letter-spacing: 2px;
    }
    header h2 {
        margin: 0;
        font-size: 22px;
        color: #777;
    }

    /* ARTICLE */
    article {
        max-width: 900px;
        margin: 40px auto;
        background: #000;
        padding: 30px;
        border: 2px solid #111;
        border-radius: 6px;
    }

    .meta {
        color: #888;
        font-size: 14px;
        margin-bottom: 20px;
    }

    .meta span {
        display: block;
    }

    h3 {
        margin-top: 0;
        font-size: 28px;
        color: #fff;
    }

    .content {
        margin-top: 20px;
        line-height: 1.6;
    }

    .image-box {
        margin: 25px 0;
        border: 1px solid #222;
        padding: 10px;
        text-align: center;
        color: #aaa;
    }

    pre {
        background: #0a0a0a;
        padding: 15px;
        border: 1px solid #222;
        overflow-x: auto;
        color: #00eaff;
    }
</style>
</head>
<body>

<header>
    <h1>AntekTECH blog</h1>
    <h2>Antek.TECH blog</h2>
</header>
