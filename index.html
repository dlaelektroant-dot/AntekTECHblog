<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AntekTECH</title>
<link rel="icon" type="image/png" href="./icon.png">
<style>
    body {
        margin: 0;
        background: #0f1525; /* CIEMNY, ŁADNY */
        color: #d6d6d6;
        font-family: "Courier New", monospace;
    }

    /* HEADER */
    header {
        padding: 40px;
        text-align: center;
        background: #000;
        border-bottom: 2px solid #1a1a1a;
    }
    header h1 {
        margin: 0;
        font-size: 50px;
        color: #fff;
        letter-spacing: 2px;
    }
    header h2 {
        margin: 0;
        font-size: 22px;
        color: #666;
    }

    /* ARTICLE */
    article {
        max-width: 900px;
        margin: 40px auto;
        background: #1f2537; /* CIEMNY PANEL */
        color: #e0e0e0;
        padding: 30px;
        border: 2px solid #000;
        border-radius: 10px;
    }

    .meta {
        color: #aaa;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .meta span {
        display: block;
    }

    h3 {
        margin-top: 0;
        font-size: 28px;
        color: #7cff7c; /* neon green */
    }

    .content {
        margin-top: 20px;
        line-height: 1.6;
    }

    .image-box {
        margin: 25px 0;
        border: 1px solid #333;
        padding: 10px;
        text-align: center;
        color: #ccc;
        background: #111;
    }

    pre {
        background: #0b0f19;
        padding: 15px;
        border: 1px solid #222;
        overflow-x: auto;
        color: #20C20E;
     }
    /* PRZYCISKI — CIEMNE, ŁADNE, ORGANICZNE */
    .btn-antek {
        display: inline-block;
        padding: 14px 32px;
        background: #48f000;
        color: #000;
        font-family: "Courier New", monospace;
        font-size: 18px;
        text-decoration: none;
        border-radius: 25% 10%; /* Twój styl */
        border: 1px solid #444;
        box-shadow: 0 0 12px #000;
        transition: 0.25s;
    }

    .btn-antek:hover {
        background: #48f000;
        box-shadow: 0 0 18px #48f000;
        transform: translateY(-3px);
    }

    /* FOOTER */
    .footer {
        text-align: center;
        padding: 20px;
        background: #000;
        color: #777;
        border-top: 2px solid #1a1a1a;
        margin-top: 40px;
    }

    .footer img {
        width: 40px;
        height: auto;
        margin: 10px;
    }
</style>
</head>
<body>

<header>
    <h1>TikTok: AntekTECH</h1>
    <h2>blog</h2>
</header>

<article>
    <div class="meta">
        <span>Data: 67.21.37</span>
        <span>Temat: ANTEKtech</span>
    </div>

    <h3>Wpis testowy</h3>

    <div class="content">
        ANTEKtech
    </div>

    <div class="image-box">
        (tu możesz wkleić obrazek)
    </div>

    <pre>
Tu możesz wkleić kod, logi, tekst itp.
    </pre>

    <a href="https://example.com" class="btn-antek">Przycisk testowy</a>
</article>

<footer class="footer">
    <div class="socials">
        <a href="https://m.youtube.com/@AntekTECH" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2024.svg" alt="YouTube">
        </a>

        <a href="https://tiktok.com/@booted.oficial" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/TikTok_logo.svg" alt="TikTok">
        </a>
    </div>

    <p>© AntekTECH 2026</p>
</footer>

</body>
</html>
