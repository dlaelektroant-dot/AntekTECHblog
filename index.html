<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AntekTECH</title>

<style>
    body {
        margin: 0;
        background: #17213b;
        color: #e0e0e0;
        font-family: "Courier New", monospace;
    }

    /* HEADER */
    header {
        padding: 40px;
        text-align: center;
        background: #000;
        border-bottom: 2px solid #222;
    }
    header h1 {
        margin: 0;
        font-size: 50px;
        color: #fff;
        letter-spacing: 2px;
    }
    header h2 {
        margin: 0;
        font-size: 22px;
        color: #777;
    }

    /* ARTICLE */
    article {
        max-width: 900px;
        margin: 40px auto;
        background: #404654;
        color: #e0e0e0; /* poprawione */
        padding: 30px;
        border: 2px solid #000;
        border-radius: 6px;
    }

    .meta {
        color: #ccc;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .meta span {
        display: block;
    }

    h3 {
        margin-top: 0;
        font-size: 28px;
        color: #0f0;
    }

    .content {
        margin-top: 20px;
        line-height: 1.6;
    }

    .image-box {
        margin: 25px 0;
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
        color: #555;
        background: #f7f7f7;
    }

    pre {
        background: #111;
        padding: 15px;
        border: 1px solid #333;
        overflow-x: auto;
        color: #00eaff;
    }

    /* PRZYCISKI */
    .antek-btn {
        background: #777;
        color: #fff;
        padding: 14px 28px;
        border: none;
        border-radius: 50px 0;
        font-family: "Courier New", monospace;
        font-size: 18px;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 0 10px #555;
        margin-top: 20px;
        display: inline-block;
        text-decoration: none;
    }

    .antek-btn:hover {
        background: #888;
        box-shadow: 0 0 18px #aaa;
        transform: translateY(-2px);
    }

    /* FOOTER */
    .footer {
        text-align: center;
        padding: 20px;
        background: #000;
        color: #777;
        border-top: 2px solid #222;
        margin-top: 40px;
    }

    .footer img {
        width: 40px;
        height: auto;
        margin: 10px;
    }
</style>
</head>
<body>

<header>
    <h1>AntekTECH</h1>
    <h2>Antek.TECH</h2>
</header>

<article>
    <div class="meta">
        <span>Data: 67.21.37</span>
        <span>Temat: ANTEKtech</span>
    </div>

    <h3>Wpis testowy</h3>

    <div class="content">
        ANTEKtech
    </div>

    <div class="image-box">
        (tu możesz wkleić obrazek)
    </div>

    <pre>
Tu możesz wkleić kod, logi, tekst itp.
    </pre>

    <a href="https://example.com" class="antek-btn">Przycisk testowy</a>
</article>

<footer class="footer">
    <div class="socials">
        <a href="https://m.youtube.com/@AntekTECH" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2024.svg" alt="YouTube">
        </a>

        <a href="https://tiktok.com/@booted.oficial" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/TikTok_logo.svg" alt="TikTok">
        </a>
    </div>

    <p>© AntekTECH 2026</p>
</footer>

</body>
</html>
